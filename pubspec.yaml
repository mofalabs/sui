name: sui
description: A cross-platform SDK for Sui blockchain, supporting Mobile, Web and Desktop.
version: 0.4.0
homepage: https://github.com/mofalabs/sui

environment:
  sdk: ">=3.0.3 <4.0.0"
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  bip32:
    git:
      url: https://github.com/mofalabs/bip32.git
      ref: v2.0.1
  bip39:
    git:
      url: https://github.com/mofalabs/bip39.git
      ref: v1.0.7
  ed25519_edwards: 0.3.1
  pointycastle: 4.0.0
  bcs: ^0.1.1
  dio: ^5.1.2
  hex: ^0.2.0
  freezed_annotation: ^2.2.0
  json_annotation: ^4.8.0
  web_socket_channel: ^2.4.0
  protobuf: ^4.1.0
  fixnum: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0
  build_runner: ^2.3.3
  freezed: ^2.3.2
  json_serializable: ^6.6.1

